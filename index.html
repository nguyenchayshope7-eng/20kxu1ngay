<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý Email Online - Auto Filter</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#f0f2f5;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  transition:.5s;
}
body.duplicate-mode{
  background:#8b0000!important;
  color:black!important;
}
textarea,input,button{
  font-size:16px;
  width:90%;
  max-width:340px;
  margin-top:10px;
  padding:12px;
  border-radius:6px;
  border:1px solid #ccc;
}
button{background:#007bff;color:white;border:none}
#deleteListButton{background:#0f4d0a}
#copyButton{background:#a728a7}
#clearLogsButton{background:#ffc107;color:black}

#customToast{
  position:fixed;
  top:-100px;
  left:0;
  width:100%;
  padding:16px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  transition:.5s;
  z-index:9999;
  background:#343a40;
  color:white;
}
#customToast.show{top:0}
#customToast.error{background:#d93025}
#customToast.success{background:#28a745}
</style>
</head>

<body>
<div id="customToast"></div>

<h3>📨 Tặng Em Con Chim Thật To</h3>

<textarea id="emailListInput" placeholder="Dán email"></textarea>
<button id="addListButton">➕ Thêm Email</button>
<button id="deleteListButton">🗑️ Xóa Danh Sách Email</button>

<input id="emailOutput" readonly>
<button id="manualCopyButton">📋 Copy</button>

<p id="count">📊 Số email còn lại: 0</p>

<button id="clearLogsButton">🧹 Clear Log</button>
<button id="copyButton">📋 Lấy & Copy Email</button>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDUu0LHI1EAjfa3DNqICkXSLeqc0MMaaPw",
  authDomain: "emailxll11111.firebaseapp.com",
  databaseURL: "https://emailxl11111-default-rtdb.asia-southeast1.firebasedatabase.app"
  projectId: "emailxll11111",
  storageBucket: "emailxll11111.firebasestorage.app",
  messagingSenderId: "275159613135",
  appId: "1:275159613135:web:7e920ad98d186b239bc1ba",
  measurementId: "G-8HK1QTLZF5"
};

const db=firebase.database();
const emailRef=db.ref("emails");
const copyLogsRef=db.ref("copyLogs");

/* ================= DEVICE ID ================= */
let deviceId=localStorage.getItem("deviceId");
if(!deviceId){
  deviceId="dev_"+Math.random().toString(36).slice(2,10);
  localStorage.setItem("deviceId",deviceId);
}

/* ================= STATE ================= */
let emailList=[];

/* ================= UTILS ================= */
function extractEmails(t){
  const r=/[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/gi;
  return [...new Set(t.match(r)||[])];
}
function updateCount(){
  count.textContent=`📊 Số email còn lại: ${emailList.length}`;
}

/* ================= TOAST ================= */
function showToast(msg,type){
  const t=customToast;
  t.className="show "+(type||"");
  t.textContent=msg;
  if(type!=="error") setTimeout(()=>t.className="",4000);
}
function hideToast(){
  customToast.className="";
  document.body.classList.remove("duplicate-mode");
}

/* ================= COPY ================= */
function copyText(t){
  navigator.clipboard.writeText(t)
    .then(()=>showToast("✅ Đã copy: "+t,"success"))
    .catch(()=>showToast("⚠️ Không copy được","error"));
}

/* ================= FIREBASE LISTENER ================= */
emailRef.on("value",s=>{
  emailList=s.val()?Object.values(s.val()):[];
  updateCount();
});

/* ================= ADD ================= */
addListButton.onclick=()=>{
  const arr=extractEmails(emailListInput.value);
  if(!arr.length) return showToast("⚠️ Không có email hợp lệ","error");
  arr.forEach(e=>emailRef.push(e));
  emailListInput.value="";
};

/* ================= DELETE ================= */
deleteListButton.onclick=()=>{
  if(!confirm("Xóa toàn bộ email?")) return;
  emailRef.remove();
  showToast("✅ Đã xóa danh sách","success");
};

/* ================= MANUAL COPY ================= */
manualCopyButton.onclick=()=>{
  if(!emailOutput.value) return showToast("⚠️ Không có email","error");
  copyText(emailOutput.value);
};

/* ================= AUTO COPY + CHECK TRÙNG ================= */
copyButton.onclick=()=>{
  hideToast();

  if(!emailList.length)
    return showToast("⚠️ Danh sách đã hết email","error");

  const email=emailList[Math.floor(Math.random()*emailList.length)];
  emailOutput.value=email;
  copyText(email);

  const now=Date.now();

  // ✅ CHECK TRÙNG TRƯỚC
  copyLogsRef.orderByChild("time")
    .startAt(now-15000)
    .once("value",snap=>{
      const logs=snap.val()||{};
      for(const k in logs){
        const l=logs[k];
        if(l.email===email && l.deviceId!==deviceId){
          document.body.classList.add("duplicate-mode");
          showToast(`⚠️ Email "${email}" đã bị lấy bởi thiết bị khác!`,"error");
          break;
        }
      }

      // ✅ GHI LOG SAU
      copyLogsRef.child(now+"_"+deviceId)
        .set({email,time:now,deviceId});
    });

  // Xóa email khỏi danh sách
  emailRef.orderByValue().equalTo(email)
    .limitToFirst(1).once("value",s=>{
      s.forEach(c=>c.ref.remove());
    });
};

/* ================= CLEAR LOG ================= */
clearLogsButton.onclick=()=>{
  copyLogsRef.remove();
  showToast("✅ Đã clear log","success");
};
</script>
</body>
</html>
